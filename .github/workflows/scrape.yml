name: Scrape Prices

on:
  schedule:
    - cron: '0 14,2 * * *'  # 8 AM and 8 PM MST (UTC-6)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper (skip Cloudflare-protected stores)
        run: python tracker.py --skip-cloudflare --no-push

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ charts/ README.md
          git diff --staged --quiet || git commit -m "Update prices $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
